<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Palabra - 西语记忆魔方</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        .card-container { perspective: 1000px; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; }
        .card-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; position: absolute; width: 100%; height: 100%; }
        .card-back { transform: rotateY(180deg); }
        .duo-btn { transition: all 0.1s ease; border-bottom: 4px solid; }
        .duo-btn:active { border-bottom-width: 0px; transform: translateY(4px); }
    </style>
</head>
<body class="bg-[#f7f7f7] font-sans flex flex-col items-center p-4 min-h-screen">

    <header class="w-full max-w-md flex justify-between items-center py-4 border-b-2 border-[#e5e5e5] mb-8">
        <span class="text-xl font-black text-[#58cc02]">🦉 Palabra</span>
        <span class="text-sm font-bold text-[#afafaf]">待复习: <span id="count" class="text-[#ff9600]">0</span></span>
    </header>

    <main class="w-full max-w-md">
        <div class="card-container w-full aspect-[4/3] cursor-pointer mb-6" onclick="flip()">
            <div id="card" class="card-inner w-full h-full relative">
                <div class="card-front bg-white border-2 border-[#e5e5e5] rounded-2xl p-6 flex flex-col justify-center items-center shadow-sm">
                    <h2 id="f-word" class="text-4xl font-black">欢迎使用</h2>
                    <p class="text-xs text-[#afafaf] mt-4">点击翻转卡片</p>
                </div>
                <div class="card-back bg-white border-2 border-[#58cc02] rounded-2xl p-6 flex flex-col justify-center items-center shadow-sm text-center">
                    <p id="b-meaning" class="text-xs font-bold text-[#58cc02] bg-[#e5ffcf] px-2 py-1 rounded mb-2"></p>
                    <p id="b-example" class="italic text-lg font-medium mb-1"></p>
                    <p id="b-trans" class="text-sm text-[#777]"></p>
                </div>
            </div>
        </div>

        <div id="controls" class="grid grid-cols-3 gap-2 hidden">
            <button onclick="grade(0)" class="duo-btn bg-[#ff4b4b] border-[#b33333] text-white font-bold py-3 rounded-xl text-sm">再记</button>
            <button onclick="grade(1)" class="duo-btn bg-[#ffc800] border-[#b89100] text-white font-bold py-3 rounded-xl text-sm">模糊</button>
            <button onclick="grade(2)" class="duo-btn bg-[#58cc02] border-[#46a302] text-white font-bold py-3 rounded-xl text-sm">秒答</button>
        </div>
    </main>

    <footer class="w-full max-w-md mt-10 bg-white p-4 rounded-xl border border-[#e5e5e5]">
        <h3 class="text-sm font-bold mb-2">📥 数据管理</h3>
        <textarea id="import-area" class="w-full text-xs p-2 border rounded mb-2 h-16" placeholder="粘贴 JSON..."></textarea>
        <div class="grid grid-cols-2 gap-2">
            <button onclick="importWord()" class="bg-[#1cb0f6] text-white font-bold py-2 rounded-xl text-sm">导入/同步</button>
            <button onclick="exportData()" class="bg-[#e5e5e5] text-[#777] font-bold py-2 rounded-xl text-sm">导出数据</button>
        </div>
    </footer>

    <script>
        let deck = JSON.parse(localStorage.getItem('myDeck') || '[]');
        function updateUI() {
            const now = new Date().getTime();
            const due = deck.filter(c => c.nextReview <= now);
            document.getElementById('count').innerText = due.length;
            if (due.length > 0) {
                const c = due[0];
                document.getElementById('f-word').innerText = c.word;
                document.getElementById('b-meaning').innerText = c.pos + " " + c.meaning;
                document.getElementById('b-example').innerText = c.example;
                document.getElementById('b-trans').innerText = c.translation;
            } else {
                document.getElementById('f-word').innerText = "学习完毕！";
            }
        }
        function flip() { document.getElementById('card').classList.toggle('card-flipped'); document.getElementById('controls').classList.remove('hidden'); }
        function grade(type) {
            let now = new Date().getTime();
            let card = deck.find(c => c.nextReview <= now);
            if (type === 0) card.nextReview = now + 300000;
            else if (type === 1) card.nextReview = now + 86400000;
            else card.nextReview = now + 86400000 * 2.5;
            localStorage.setItem('myDeck', JSON.stringify(deck));
            document.getElementById('card').classList.remove('card-flipped');
            updateUI();
        }
        function importWord() {
            try {
                let data = JSON.parse(document.getElementById('import-area').value);
                data.nextReview = new Date().getTime();
                deck.push(data);
                localStorage.setItem('myDeck', JSON.stringify(deck));
                alert("导入成功！"); updateUI();
            } catch(e) { alert("JSON 格式错误"); }
        }
        function exportData() {
            const blob = new Blob([localStorage.getItem('myDeck')], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'myDeck.json'; a.click();
        }
        updateUI();
    </script>
</body>
</html>
